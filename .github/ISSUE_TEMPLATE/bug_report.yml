name: Bug report
description: Something is broken or behaves unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Clear description of the bug.
      placeholder: When I click Run analysis on a CSV with mixed-type columns, …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Upload `…csv`
        2. Pick `…` as time / `…` as target
        3. Run analysis
        4. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DQT version / commit
      placeholder: 0.1.0 or commit sha
  - type: dropdown
    id: surface
    attributes:
      label: Where
      options:
        - Web UI (Dash)
        - CLI (`dqt analyze`)
        - Python library (import dqt)
        - Deploy / install.sh
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12.3
        - Browser (if UI): Chrome 138
